<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garage – Kennzeichenerkennung</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <h1>Garage Kennzeichenerkennung</h1>
        <div class="connection-status" id="connectionStatus">
            <span class="dot offline"></span>
            <span id="connectionText">Verbinde...</span>
        </div>
    </header>

    <main>
        <section class="camera-section">
            <div class="camera-container">
                <img id="cameraFeed" alt="Kamerabild">
                <div class="camera-overlay" id="cameraOverlay">
                    <span>ESP32 nicht erreichbar</span>
                </div>
            </div>

            <div class="status-panel">
                <div class="status-light-container">
                    <div class="status-light" id="statusLight"></div>
                    <span class="status-label" id="statusLabel">Warte auf Erkennung...</span>
                </div>

                <div class="plate-display" id="plateDisplay">
                    <span class="plate-text" id="plateText">–</span>
                    <span class="confidence" id="confidenceText"></span>
                </div>

                <div class="last-update" id="lastUpdate"></div>
            </div>
        </section>

        <nav class="tabs">
            <button class="tab-btn active" data-tab="whitelist">Whitelist</button>
            <button class="tab-btn" data-tab="log">Erkennungs-Log</button>
            <button class="tab-btn" data-tab="settings">Einstellungen</button>
        </nav>

        <!-- Tab: Whitelist -->
        <section class="tab-content active" id="tab-whitelist">
            <div class="card">
                <h2>Kennzeichen hinzufügen</h2>
                <form id="addPlateForm" class="add-form">
                    <input type="text" id="newPlate" placeholder="z.B. M-AB1234" maxlength="15" required>
                    <input type="text" id="newDescription" placeholder="Beschreibung (optional)" maxlength="100">
                    <button type="submit" class="btn btn-primary">Hinzufügen</button>
                </form>
            </div>

            <div class="card">
                <h2>Erlaubte Kennzeichen</h2>
                <div class="filter-bar">
                    <label>
                        <input type="checkbox" id="showOnlyActive" checked>
                        Nur aktive anzeigen
                    </label>
                    <span class="plate-count" id="plateCount">0 Einträge</span>
                </div>
                <div id="platesList" class="plates-list">
                    <div class="loading">Lade...</div>
                </div>
            </div>
        </section>

        <!-- Tab: Log -->
        <section class="tab-content" id="tab-log">
            <div class="card">
                <div class="card-header">
                    <h2>Erkennungs-Verlauf</h2>
                    <button class="btn btn-secondary" id="refreshLog">Aktualisieren</button>
                </div>
                <div id="logList" class="log-list">
                    <div class="loading">Lade...</div>
                </div>
            </div>
        </section>

        <!-- Tab: Einstellungen -->
        <section class="tab-content" id="tab-settings">
            <div class="card">
                <h2>System-Status</h2>
                <div id="systemStatus" class="status-grid">
                    <div class="loading">Lade...</div>
                </div>
            </div>

            <div class="card">
                <h2>Scanner</h2>
                <div class="scanner-controls">
                    <button class="btn btn-primary" id="startScan">Scan starten</button>
                    <button class="btn btn-danger" id="stopScan">Scan stoppen</button>
                    <button class="btn btn-secondary" id="scanOnce">Einmal scannen</button>
                </div>
            </div>

            <div class="card">
                <h2>Bild hochladen (Test)</h2>
                <form id="uploadForm" class="upload-form">
                    <input type="file" id="uploadFile" accept="image/*" required>
                    <button type="submit" class="btn btn-primary">Erkennen</button>
                </form>
                <div id="uploadResult"></div>
            </div>
        </section>
    </main>

    <script src="/static/js/app.js"></script>
</body>
</html>
