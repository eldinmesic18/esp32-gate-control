<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Documentation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Markdown Styles */
        .prose {
            max-width: none;
        }

        .prose h1 {
            font-size: 2.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #fff;
        }

        .prose h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 2rem;
            margin-bottom: 1rem;
            color: #e2e8f0;
            border-bottom: 1px solid #334155;
            padding-bottom: 0.5rem;
        }

        .prose h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            color: #cbd5e1;
        }

        .prose p {
            margin-bottom: 1rem;
            line-height: 1.75;
            color: #94a3b8;
        }

        .prose ul {
            list-style-type: disc;
            padding-left: 1.5rem;
            margin-bottom: 1rem;
            color: #94a3b8;
        }

        .prose ol {
            list-style-type: decimal;
            padding-left: 1.5rem;
            margin-bottom: 1rem;
            color: #94a3b8;
        }

        .prose code {
            background-color: #1e293b;
            padding: 0.2rem 0.4rem;
            rounded: 0.25rem;
            font-family: monospace;
            color: #e2e8f0;
            border-radius: 0.25rem;
        }

        .prose pre {
            background-color: #1e293b;
            padding: 1rem;
            overflow-x: auto;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #334155;
        }

        .prose pre code {
            background-color: transparent;
            padding: 0;
            color: #e2e8f0;
        }

        .prose a {
            color: #60a5fa;
            text-decoration: none;
        }

        .prose a:hover {
            text-decoration: underline;
        }

        .prose blockquote {
            border-left: 4px solid #3b82f6;
            padding-left: 1rem;
            font-style: italic;
            color: #64748b;
            margin-bottom: 1rem;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-slate-900 text-slate-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <header
            class="mb-8 flex justify-between items-center bg-slate-900/90 backdrop-blur sticky top-0 py-4 z-10 border-b border-slate-800">
            <h1 class="text-xl font-bold text-slate-200 truncate">{{ title }}</h1>
            <a href="/docs"
                class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg font-medium transition-colors border border-slate-700 text-sm">
                &larr; Back
            </a>
        </header>

        <article class="prose prose-invert bg-slate-800/50 p-8 rounded-2xl border border-slate-700">
            {{ content | safe }}
        </article>
    </div>
</body>

</html>
