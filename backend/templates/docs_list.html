<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Documentation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-slate-900 text-slate-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <header class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-white">Project Documentation</h1>
                <p class="text-slate-400 mt-1">Setup Guides & Plans</p>
            </div>
            <a href="/"
                class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg font-medium transition-colors">
                &larr; Back to Dashboard
            </a>
        </header>

        <div class="grid gap-4">
            {% for file in files %}
            <a href="/docs/{{ file }}"
                class="block bg-slate-800 p-6 rounded-xl hover:bg-slate-700 transition-colors border border-slate-700 hover:border-blue-500/50 group">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="bg-blue-500/10 p-3 rounded-lg text-blue-400 group-hover:text-blue-300">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                            </svg>
                        </div>
                        <div>
                            <h3 class="text-lg font-semibold text-white group-hover:text-blue-200">{{ file }}</h3>
                            <p class="text-slate-400 text-sm">View documentation file</p>
                        </div>
                    </div>
                    <span class="text-slate-500 group-hover:text-white transition-colors">&rarr;</span>
                </div>
            </a>
            {% endfor %}
        </div>
    </div>
</body>

</html>
